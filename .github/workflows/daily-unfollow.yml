name: daily-unfollow
# Daily trigger for the deployed Browserbase x-unfollow function.

# The browser work runs on Browserbase (the deployed `x-unfollow` Function). This workflow is just
# the daily trigger — it pokes the function's invoke URL. No Node, no checkout, no session here.
#
# Requires repo secrets:
#   BROWSERBASE_API_KEY  — your Browserbase key
#   BB_FUNCTION_ID       — the id printed by `bb publish` (see functions/DEPLOY.md)
on:
  schedule:
    # Twice a day, ~12h apart → ~60 unfollows/day at max=30 each. Spacing keeps it gentle on X's
    # account-level throttle (burst size is what trips it, not the daily total spread thin).
    - cron: "0 17 * * *" # 17:00 UTC ≈ 10am PT
    - cron: "0 5 * * *"  # 05:00 UTC ≈ 10pm PT
  workflow_dispatch:
    inputs:
      max:
        description: "How many to unfollow this run"
        default: "30"

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Browserbase unfollow function
        run: |
          MAX="${{ github.event.inputs.max || '30' }}"
          echo "Invoking x-unfollow (max=$MAX)…"
          HTTP=$(curl -sS -w '\n%{http_code}' -X POST \
            "https://api.browserbase.com/v1/functions/${{ secrets.BB_FUNCTION_ID }}/invoke" \
            -H "x-bb-api-key: ${{ secrets.BROWSERBASE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"params\":{\"max\":$MAX}}")
          BODY=$(echo "$HTTP" | sed '$d')
          CODE=$(echo "$HTTP" | tail -1)
          echo "HTTP $CODE"
          echo "$BODY"
          # 2xx = accepted. Anything else (e.g. 402 plan limit) fails the run so you get notified.
          [ "$CODE" -ge 200 ] && [ "$CODE" -lt 300 ]
